# Hyprland keybinds

# Assign variables
$terminal = kitty
$terminal_alt = ghostty
$fileManager = dolphin
$menu = rofi -show drun -theme $HOME/rofi-collection/theme.rasi
$browser = firefox
$browser_alt = vivaldi


# $menu = hyprlauncher
###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod SHIFT, return, exec, $terminal_alt
bind = $mainMod , backspace, exec, kitten quick-access-terminal --config ~/.config/kitty/quick-access-terminal.conf
bind = $mainMod, Q, killactive,
# bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, F12, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, N, togglefloating,
bind = $mainMod, space, exec, $menu
bind = $mainMod, D, exec, ~/.config/hypr/scripts/toggle-rofi.sh
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, I, layoutmsg, togglesplit
bind = $mainMod, M, layoutmsg, swapsplit
bind = $mainMod,       B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser_alt
bind = CTRL SHIFT ALT, F9, exec, kanata-toggle
bind = CTRL SHIFT ALT, F8, exec, ~/.config/hypr/scripts/toggle-tv.sh
# bind = $mainMod, J, togglesplit, # dwindle
# bind = $mainMod SHIFT, I, layoutmsg, swapsplit

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, J, movefocus, d

# Control tiling
bindd = SUPER, Y, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch to next/previous workspace with the mouse wheel
bind = $mainMod SHIFT, mouse_down, workspace, +1
bind = $mainMod SHIFT, mouse_up, workspace, -1
# Switch to the next/previous workspace with the arrow keys
bind = $mainMod SHIFT, right, workspace, +1
bind = $mainMod SHIFT, left, workspace, -1
# Switch to the next/previous workspace with ',' and '.' keys
bind = $mainMod SHIFT, period, workspace, +1
bind = $mainMod SHIFT, comma, workspace,
# Switch to the next/previous workspace with H and L
bind = $mainMod SHIFT, L, workspace, +1
bind = $mainMod SHIFT, H, workspace, -1

# Move active window to next/previous workspace with H and L
bind = $mainMod CTRL, L, movetoworkspacesilent, +1
bind = $mainMod CTRL, H, movetoworkspacesilent, -1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
bindd = SUPER ALT SHIFT, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = SUPER ALT SHIFT, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = SUPER ALT SHIFT, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = SUPER ALT SHIFT, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER ALT SHIFT, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER ALT SHIFT, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER ALT SHIFT, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER ALT SHIFT, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER ALT SHIFT, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER ALT SHIFT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


bind = $mainMod SHIFT, C, exec, hyprpicker -an # JR Open the hypr color picker
bind = $mainMod ALT, period, exec, rofi -modi emoji -show emoji # JR Open Rofi-emoji picker
# bind = $mainMod, period, exec, emote
bind = CONTROL ALT, E, exec, emote # JR Open Emote emoji picker
bind = $mainMod SHIFT, R, exec, ~/.config/waybar/scripts/launch.sh #JR Execute launch.sh to relaunch Waybar
bind = $mainMod, O, exec, obsidian # JR Binding for Obsidian
bind = CONTROL, print, exec, hyprshot -m region # JR Take screenshot of selected region
bind = SHIFT, print, exec, hyprshot -m output # JR Take screenshot of an entire monitor
bind = $mainMod, F, fullscreen # JR Put tile into fullscreen

# Move Scrolling layout
bind = $mainMod, period, layoutmsg, move -col # JR Binding for Scrolling layout
bind = $mainMod, comma, layoutmsg, move +col
bind = $mainMod, mouse_up, layoutmsg, move +col
bind = $mainMod, mouse_down, layoutmsg, move -col


# Swap Scrolling Layout
bind = $mainMod CONTROL, comma, layoutmsg, swapcol l
bind = $mainMod CONTROL, period, layoutmsg, swapcol r

# Hyprspace
bind = $mainMod ALT, T, overview:toggle # Currently half BROKEN!

# Copy / Paste
bindd = $mainMod, C, Universal copy, sendshortcut, CTRL, Insert,
# bindd = $mainMod, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = $mainMod, X, Universal cut, sendshortcut, CTRL, X,
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard
bind = $mainMod CTRL, V, exec, cursor-clip
