# Hyprsplit configuration


# General configuration
 plugin {
     hyprsplit {
        num_workspaces = 5
        persistent-workspaces = 0
     }
 }

# load Hyprsplit
plugin = /home/janis/Repos/hyprsplit/hyprsplit.so

# Add keybinds
bind = SUPER, 1, split:workspace, 1
bind = SUPER, 2, split:workspace, 2
bind = SUPER, 3, split:workspace, 3
bind = SUPER, 4, split:workspace, 4
bind = SUPER, 5, split:workspace, 5
bind = SUPER, 6, split:workspace, 6
bind = SUPER, 7, split:workspace, 7
bind = SUPER, 8, split:workspace, 8
bind = SUPER, 9, split:workspace, 9
bind = SUPER, 10, split:workspace, 10

bind = SUPER SHIFT, 1, split:movetoworkspace, 1
bind = SUPER SHIFT, 2, split:movetoworkspace, 2
bind = SUPER SHIFT, 3, split:movetoworkspace, 3
bind = SUPER SHIFT, 4, split:movetoworkspace, 4
bind = SUPER SHIFT, 5, split:movetoworkspace, 5
bind = SUPER SHIFT, 6, split:movetoworkspace, 6
bind = SUPER SHIFT, 7, split:movetoworkspace, 7
bind = SUPER SHIFT, 8, split:movetoworkspace, 8
bind = SUPER SHIFT, 9, split:movetoworkspace, 9
bind = SUPER SHIFT, 10, split:movetoworkspace, 10

bind = SUPER SHIFT ALT, 1, split:movetoworkspacesilent, 1
bind = SUPER SHIFT ALT, 2, split:movetoworkspacesilent, 2
bind = SUPER SHIFT ALT, 3, split:movetoworkspacesilent, 3
bind = SUPER SHIFT ALT, 4, split:movetoworkspacesilent, 4
bind = SUPER SHIFT ALT, 5, split:movetoworkspacesilent, 5
bind = SUPER SHIFT ALT, 6, split:movetoworkspacesilent, 6
bind = SUPER SHIFT ALT, 7, split:movetoworkspacesilent, 7
bind = SUPER SHIFT ALT, 8, split:movetoworkspacesilent, 8
bind = SUPER SHIFT ALT, 9, split:movetoworkspacesilent, 9
bind = SUPER SHIFT ALT, 10, split:movetoworkspacesilent, 10

bind = SUPER, A, split:swapactiveworkspaces, current +1
bind = SUPER, G, split:grabroguewindows
bind = SUPER CONTROL, 1, split:movetoworkspace, 1
