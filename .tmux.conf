# ~/.tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Ctrl+Shift → switch window
bind-key -n C-S-Left  select-window -t -1
bind-key -n C-S-Right select-window -t +1

# Ctrl+Alt → swap window
bind-key -n C-M-Left  swap-window -t -1 \; select-window -t -1
bind-key -n C-M-Right swap-window -t +1 \; select-window -t +1

# ============================================
# DISPLAY POPUPS
# ============================================

# Lazygit popup
bind C-g display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "lazygit"

# Yazi popup
bind C-e display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "ranger"

# New zsh shell
bind C-j display-popup \
  -d "#{pane_current_path}" \
  -E "zsh"

# Create new tmux session
bind C-n display-popup \
  -w 20% \
  -h 20% \
  -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'

# RMPC popup
bind C-m display-popup \
  -w 80% \
  -h 80% \
  -E "rmpc"

bind C-h display-popup \
  -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
# ============================================
# APPEARANCE
# ============================================

# Source Tokyonight theme
source-file ~/.tmux/themes/tokyonight_moon.tmux

# Tokyonight color palette
RED="#ff757f"
GREEN="#c3e88d"
YELLOW="#ffc777"
BLUE="#82aaff"
SKY_BLUE="#65bcff"
MAGENTA="#c099ff"
CYAN="#86e1fc"
BLACK="#1b1d2b"
DARK_GRAY="#828bb8"
LIGHT_GRAY="#c8d3f5"
BLUE_GRAY="#2F334D"
BG="#222436"
FG="#30363d"
TOKYO="#1e2030"
TMUX_GREEN="#0ee8a0"

# Glyphs
ARROW_RIGHT_FILLED="#(printf "\uE0B0")"
ARROW_LEFT_FILLED="#(printf "\uE0B2")"
CLOCK="#(printf "\ue385")"



# Status bar configuration 
set -g status-position top
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 50
# set -g status-format[1]
# set -g status 2

# Status bar colors
# set -g status-style[1] "bg=#13161d fg=#8b949e"

# Status bar content
#set -g status-left "#[fg=#0ee8a0,bold] #S #[fg=#30363d]│ "

# Status LEFT
set -g status-left "\
#[bg=${BLUE}]#[fg=${BG},bold] #S\
#[fg=${BLUE}]#[bg=${BG}]${ARROW_RIGHT_FILLED} \
"

# Status RIGHT
set -g status-right "\
#[fg=${BLUE_GRAY},bg=${TOKYO}]${ARROW_LEFT_FILLED}\
#[fg=${BLUE},bg=${BLUE_GRAY}] ${CLOCK} %H:%M \
#[fg=${BLUE},bg=${BLUE_GRAY}]${ARROW_LEFT_FILLED}\
#[fg=${BG},bg=${BLUE}] %d-%b-%y \
"

# Window status
setw -g window-status-format " #I:#W "
# setw -g window-status-current-format "#[fg=#0ee8a0,bold] #I:#W "
setw -g window-status-current-format "#[fg=${TMUX_GREEN},bold] #I:#W "

# Pane border colors
# set -g pane-border-style "fg=#30363d"
set -g pane-active-border-style "fg=#0ee8a0"

# # Message styling
set -g message-style "bg=#0ee8a0 fg=#000000 bold"

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # macOS
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"  # Linux

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "christoomey/vim-tmux-navigator"

# Plugin settings
set -g @resurrect-strategy-vim "session"
set -g @continuum-restore "on"

# Initialize TPM (keep at bottom)
run "~/.tmux/plugins/tpm/tpm"
